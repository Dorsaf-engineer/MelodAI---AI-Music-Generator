<!DOCTYPE html>
<html>
<head>
    <title>AI Music Generator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🎵 AI Music Generator</h1>

    <form action="/generate" method="POST">
        <input type="text" name="prompt" placeholder="Describe your music... (e.g. calm piano for studying)" required>
        <button type="submit">Generate Music</button>
    </form>

    <p>Your generated music will download automatically 🎧</p>
</div>

</body>
</html>
